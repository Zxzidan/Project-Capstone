<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finova AI - Login</title>
    <link rel="stylesheet" href="/css/index.css" />
    <style>
      .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-4);
      }
      .login-card {
        width: 100%;
        max-width: 420px;
        padding: var(--spacing-8);
      }
      .logo-icon {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: white;
        margin: 0 auto var(--spacing-6);
        box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="glass-panel login-card animate-fade-in">
        <div class="logo-icon">F</div>
        <h2 class="text-center mb-2">Welcome Back</h2>
        <p class="text-center text-secondary mb-8">Sign in to your Finova AI account</p>
        
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required />
          </div>
          
          <div class="form-group">
            <div class="flex justify-between items-center mb-2">
              <label class="form-label" style="margin-bottom: 0;">Password</label>
              <a href="#" class="text-sm" style="color: var(--color-primary);">Forgot password?</a>
            </div>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required />
          </div>
          
          <button type="submit" class="btn btn-primary w-full mt-4" style="width: 100%; padding: 0.75rem;">
            Sign In
          </button>
        </form>
        
        <div class="mt-6 text-center">
          <p class="text-secondary text-sm">
            Don't have an account? <a href="/pages/auth/signup.html" style="color: var(--color-primary); font-weight: 500;">Sign up</a>
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
